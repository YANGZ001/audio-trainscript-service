<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" width="960" height="660">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .code-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
      }
      .title-text {
        font-weight: 700;
        font-size: 22px;
        fill: #f9fafb;
        letter-spacing: -0.5px;
      }
      .subtitle-text {
        font-size: 13px;
        fill: #9ca3af;
        font-weight: 500;
      }
      .group-title {
        font-weight: 600;
        font-size: 11px;
        fill: #9ca3af;
        letter-spacing: 1px;
      }
      .card-title {
        font-weight: 600;
        font-size: 13px;
        fill: #f9fafb;
      }
      .card-desc {
        font-size: 11px;
        fill: #9ca3af;
      }
      .conn-text {
        font-size: 10px;
        font-weight: 500;
        fill: #cbd5e1;
      }
      .legend-text {
        font-size: 11px;
        fill: #9ca3af;
        font-weight: 500;
      }
    </style>

    <!-- Filters & Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Dot Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="#1e293b" />
    </pattern>

    <!-- Arrow Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#db2777" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981" />
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#6366f1" />
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#9ca3af" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f19" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Diagram Title Header -->
  <g transform="translate(40, 45)">
    <text class="title-text" x="0" y="0">AUDIO TRAINSCRIPT SERVICE</text>
    <text class="subtitle-text" x="0" y="22">System Architecture &amp; Data Flow Diagram</text>
  </g>

  <!-- Docker Container Group Box -->
  <g filter="url(#shadow)">
    <!-- Docker Container boundary -->
    <rect x="230" y="145" width="500" height="420" rx="16" fill="#111827" stroke="#374151" stroke-width="1.5" stroke-dasharray="6 4" />
    <!-- Docker Container Tag/Label -->
    <rect x="250" y="130" width="300" height="24" rx="12" fill="#0b0f19" stroke="#374151" stroke-width="1" />
    <text x="265" y="146" font-size="10" font-weight="700" fill="#9ca3af" letter-spacing="0.5">DOCKER CONTAINER Microservice</text>
  </g>

  <!-- ==================== NODE DEFINITIONS ==================== -->
  <!-- Node: web -->
  <g transform="translate(140, 70)" filter="url(#shadow)">
    <rect width="180" height="54" rx="10" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5" />
    <rect width="180" height="4" rx="2" fill="#3b82f6" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">React Web UI</text>
    <text class="card-desc" x="14" y="41">bilibili-copilot-web</text>
  </g>
  <!-- Node: cli -->
  <g transform="translate(390, 70)" filter="url(#shadow)">
    <rect width="180" height="54" rx="10" fill="#1f2937" stroke="#10b981" stroke-width="1.5" />
    <rect width="180" height="4" rx="2" fill="#10b981" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">CLI & Shell Scripts</text>
    <text class="card-desc" x="14" y="41">test.sh / transcribe-file.sh</text>
  </g>
  <!-- Node: curl -->
  <g transform="translate(640, 70)" filter="url(#shadow)">
    <rect width="180" height="54" rx="10" fill="#1f2937" stroke="#6366f1" stroke-width="1.5" />
    <rect width="180" height="4" rx="2" fill="#6366f1" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">cURL / REST Clients</text>
    <text class="card-desc" x="14" y="41">Direct API access</text>
  </g>
  <!-- Node: router -->
  <g transform="translate(360, 195)" filter="url(#shadow)">
    <rect width="240" height="65" rx="10" fill="#1f2937" stroke="#6366f1" stroke-width="1.5" />
    <rect width="240" height="4" rx="2" fill="#6366f1" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">Express API Server</text>
    <text class="card-desc" x="14" y="41">src/index.ts (Router & SSE)</text>
  </g>
  <!-- Node: bilibiliSrv -->
  <g transform="translate(260, 315)" filter="url(#shadow)">
    <rect width="200" height="65" rx="10" fill="#1f2937" stroke="#db2777" stroke-width="1.5" />
    <rect width="200" height="4" rx="2" fill="#db2777" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">Bilibili Service</text>
    <text class="card-desc" x="14" y="41">src/services/bilibili.ts</text>
  </g>
  <!-- Node: geminiSrv -->
  <g transform="translate(500, 315)" filter="url(#shadow)">
    <rect width="200" height="65" rx="10" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5" />
    <rect width="200" height="4" rx="2" fill="#3b82f6" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">Gemini Service</text>
    <text class="card-desc" x="14" y="41">src/services/gemini.ts</text>
  </g>
  <!-- Node: tempStorage -->
  <g transform="translate(380, 465)" filter="url(#shadow)">
    <!-- Cylinder back/body -->
    <path d="M 0 8 L 0 57 A 100 8 0 0 0 200 57 L 200 8 A 100 8 0 0 0 0 8" fill="#1f2937" stroke="#9ca3af" stroke-width="1.5" />
    <!-- Cylinder top -->
    <ellipse cx="100" cy="8" rx="100" ry="8" fill="#374151" stroke="#9ca3af" stroke-width="1.5" />
    
    <!-- Text -->
    <text class="card-title" x="100" y="28" text-anchor="middle">Local Temp Storage</text>
    <text class="card-desc" x="100" y="44" text-anchor="middle">OS tmp directory (/tmp/*.m4a)</text>
  </g>
  <!-- Node: biliAPI -->
  <g transform="translate(30, 315)" filter="url(#shadow)">
    <rect width="150" height="65" rx="10" fill="#1f2937" stroke="#db2777" stroke-width="1.5" />
    <rect width="150" height="4" rx="2" fill="#db2777" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">Bilibili Web APIs</text>
    <text class="card-desc" x="14" y="41">view / playurl / CDN stream</text>
  </g>
  <!-- Node: geminiAPI -->
  <g transform="translate(780, 315)" filter="url(#shadow)">
    <rect width="150" height="65" rx="10" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5" />
    <rect width="150" height="4" rx="2" fill="#3b82f6" />
    
    <!-- Title and Desc -->
    <text class="card-title" x="14" y="24">Google Gemini API</text>
    <text class="card-desc" x="14" y="41">File API / Generate Content</text>
  </g>

  <!-- ==================== CONNECTIONS / FLOWS ==================== -->
  <!-- Path -->
  <path d="M 230 124 L 230 170 C 230 180, 360 180, 410 192" fill="none" stroke="#3b82f6" stroke-width="1.5"  marker-end="url(#arrow-indigo)" />
  <!-- Label Mask & Text -->
  <rect x="205" y="163" width="110" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="260" y="173" text-anchor="middle">POST /api/transcribe</text>
  <!-- Path -->
  <path d="M 480 124 L 480 192" fill="none" stroke="#10b981" stroke-width="1.5"  marker-end="url(#arrow-indigo)" />
  <!-- Label Mask & Text -->
  <rect x="410" y="145" width="140" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="480" y="155" text-anchor="middle">POST /api/upload-transcribe</text>
  <!-- Path -->
  <path d="M 730 124 L 730 170 C 730 180, 600 180, 550 192" fill="none" stroke="#6366f1" stroke-width="1.5"  marker-end="url(#arrow-indigo)" />
  <!-- Label Mask & Text -->
  <rect x="665" y="163" width="70" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="700" y="173" text-anchor="middle">API requests</text>
  <!-- Path -->
  <path d="M 450 195 L 450 150 C 450 140, 260 140, 210 128" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-blue)" />
  <!-- Label Mask & Text -->
  <rect x="250" y="131" width="160" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="330" y="141" text-anchor="middle">SSE Progress & Results Stream</text>
  <!-- Path -->
  <path d="M 420 260 L 380 310" fill="none" stroke="#6366f1" stroke-width="1.5"  marker-end="url(#arrow-pink)" />
  <!-- Label Mask & Text -->
  <rect x="332" y="276" width="100" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="382" y="286" text-anchor="middle">1. Trigger Download</text>
  <!-- Path -->
  <path d="M 540 260 L 580 310" fill="none" stroke="#6366f1" stroke-width="1.5"  marker-end="url(#arrow-blue)" />
  <!-- Label Mask & Text -->
  <rect x="538" y="276" width="80" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="578" y="286" text-anchor="middle">2. Transcribe</text>
  <!-- Path -->
  <path d="M 260 335 L 184 335" fill="none" stroke="#db2777" stroke-width="1.5"  marker-end="url(#arrow-pink)" />
  <!-- Label Mask & Text -->
  <rect x="172.5" y="322" width="95" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="220" y="332" text-anchor="middle">Fetch view/playurl</text>
  <!-- Path -->
  <path d="M 180 360 L 256 360" fill="none" stroke="#db2777" stroke-width="1.5"  marker-end="url(#arrow-pink)" />
  <!-- Label Mask & Text -->
  <rect x="182.5" y="347" width="75" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="220" y="357" text-anchor="middle">Audio Stream</text>
  <!-- Path -->
  <path d="M 360 380 L 360 420 C 360 440, 420 440, 440 460" fill="none" stroke="#db2777" stroke-width="1.5"  marker-end="url(#arrow-slate)" />
  <!-- Label Mask & Text -->
  <rect x="360" y="427" width="60" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="390" y="437" text-anchor="middle">Save .m4a</text>
  <!-- Path -->
  <path d="M 700 335 L 776 335" fill="none" stroke="#3b82f6" stroke-width="1.5"  marker-end="url(#arrow-blue)" />
  <!-- Label Mask & Text -->
  <rect x="692.5" y="322" width="95" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="740" y="332" text-anchor="middle">Upload & run ASR</text>
  <!-- Path -->
  <path d="M 780 360 L 704 360" fill="none" stroke="#3b82f6" stroke-width="1.5"  marker-end="url(#arrow-blue)" />
  <!-- Label Mask & Text -->
  <rect x="697.5" y="347" width="85" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="740" y="357" text-anchor="middle">JSON Transcript</text>
  <!-- Path -->
  <path d="M 600 380 L 600 420 C 600 440, 520 440, 500 460" fill="none" stroke="#3b82f6" stroke-width="1.5"  marker-end="url(#arrow-slate)" />
  <!-- Label Mask & Text -->
  <rect x="502.5" y="427" width="95" height="14" rx="3" fill="#0b0f19" />
  <text class="conn-text" x="550" y="437" text-anchor="middle">Read & Clean .m4a</text>

  <!-- Environment variables annotations -->
  <g transform="translate(620, 500)">
    <!-- Background card -->
    <rect width="180" height="74" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1" />
    <rect width="180" height="3" rx="1" fill="#6366f1" />
    <!-- Label -->
    <text class="group-title" x="10" y="20">REQUIRED ENV VARS</text>
    <text class="code-text" x="10" y="38" fill="#db2777">BILIBILI_SESSION_TOKEN</text>
    <text class="code-text" x="10" y="54" fill="#3b82f6">GEMINI_API_KEY</text>
    <text class="code-text" x="10" y="68" fill="#9ca3af">PORT (optional)</text>
  </g>

  <!-- Startup Scan cleanup annotation -->
  <g transform="translate(260, 520)">
    <circle cx="10" cy="15" r="4" fill="#10b981" />
    <text class="card-desc" x="22" y="18" fill="#9ca3af">Startup cleanup: Deletes orphaned cloud files (&gt;1 hr)</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(40, 605)">
    <!-- Legend Boundary -->
    <rect width="880" height="35" rx="6" fill="#111827" stroke="#374151" stroke-width="1" />
    
    <!-- Legend Items -->
    <g transform="translate(20, 10)">
      <!-- Item 1: Control Request -->
      <line x1="0" y1="8" x2="30" y2="8" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)" />
      <text class="legend-text" x="40" y="12">HTTP API Request</text>

      <!-- Item 2: SSE Stream -->
      <line x1="200" y1="8" x2="230" y2="8" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-blue)" />
      <text class="legend-text" x="240" y="12">SSE Events Stream</text>

      <!-- Item 3: Bilibili audio download -->
      <line x1="420" y1="8" x2="450" y2="8" stroke="#db2777" stroke-width="1.5" marker-end="url(#arrow-pink)" />
      <text class="legend-text" x="460" y="12">Bilibili Data Flow</text>

      <!-- Item 4: Gemini flow -->
      <line x1="620" y1="8" x2="650" y2="8" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" />
      <text class="legend-text" x="660" y="12">Gemini API Integration</text>
      
      <!-- Item 5: Local storage flow -->
      <line x1="790" y1="8" x2="820" y2="8" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow-slate)" />
      <text class="legend-text" x="830" y="12">File Storage I/O</text>
    </g>
  </g>
</svg>
