services:
  audio-trainscript-service:
    build: .
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - BILIBILI_SESSION_TOKEN=${BILIBILI_SESSION_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SNIPD_API_KEY=${SNIPD_API_KEY}
      - PORT=${PORT:-3001}
      - DB_PATH=/data/db/transcriptions.db
      - RATE_LIMITS_PATH=${RATE_LIMITS_PATH:-/app/config/rate-limits.json}
    volumes:
      - bilibili-audio-cache:/data/bilibili-audio
      - snipd-audio-cache:/data/snipd-audio
      - xiaoyuzhou-audio-cache:/data/xiaoyuzhou-audio
      - transcriptions-db:/data/db
    restart: unless-stopped

volumes:
  bilibili-audio-cache:
  snipd-audio-cache:
  xiaoyuzhou-audio-cache:
  transcriptions-db:
